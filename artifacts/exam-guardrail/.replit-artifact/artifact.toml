kind = "web"
previewPath = "/"
title = "Exam Guardrail System"
version = "1.0.0"
id = "artifacts/exam-guardrail"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20216
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/exam-guardrail run dev"

[services.env]
PORT = "20216"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/exam-guardrail", "run", "build"]
publicDir = "artifacts/exam-guardrail/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
